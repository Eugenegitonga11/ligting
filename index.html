<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CineTemp — Color Temperature Tool</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; }

  #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
  #header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.15em; color: #fff; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 0.5px solid rgba(255,255,255,0.12); }
  .badge.live { background: rgba(0,200,100,0.15); color: #00c864; border-color: rgba(0,200,100,0.3); }

  #main { display: grid; grid-template-columns: 1fr 280px; min-height: calc(100vh - 49px); }

  /* Camera */
  #camera-section { position: relative; background: #000; overflow: hidden; }
  #videoEl { width: 100%; height: 100%; object-fit: cover; display: none; }
  #canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
  #no-camera { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; color: rgba(255,255,255,0.4); gap: 12px; }
  #no-camera i { font-size: 48px; }
  #no-camera p { font-size: 13px; }
  #start-btn { margin-top: 8px; padding: 10px 24px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  #start-btn:hover { background: rgba(255,255,255,0.14); }

  /* Readings overlay */
  #readings-overlay { position: absolute; top: 14px; left: 14px; display: none; flex-direction: column; gap: 8px; }
  .reading-pill { padding: 6px 14px; border-radius: 20px; background: rgba(0,0,0,0.6); color: #fff; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; backdrop-filter: blur(6px); border: 0.5px solid rgba(255,255,255,0.1); }
  .reading-pill span.label { font-size: 10px; opacity: 0.55; margin-right: 5px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Crosshair */
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; pointer-events: none; display: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.6); }
  #crosshair::before { width: 1px; height: 100%; left: 50%; }
  #crosshair::after { height: 1px; width: 100%; top: 50%; }

  /* Histogram */
  #histogram-container { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.55); padding: 8px 14px 8px; display: none; }
  #histogram-container p { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  #histCanvas { width: 100%; height: 52px; display: block; }

  /* Sidebar */
  #sidebar { border-left: 0.5px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; background: #111; }
  #lens-selector { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .lens-btn { flex: 1; padding: 6px 0; font-size: 12px; border: 0.5px solid rgba(255,255,255,0.12); border-radius: 8px; background: transparent; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.15s; }
  .lens-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); }

  .sidebar-section { padding: 14px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .sidebar-section h3 { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
  .metric-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .metric-label { font-size: 12px; color: rgba(255,255,255,0.45); }
  .metric-value { font-size: 16px; font-weight: 500; color: #fff; }
  .metric-unit { font-size: 11px; color: rgba(255,255,255,0.4); margin-left: 2px; }

  /* Temp bar */
  #temp-bar-wrap { margin-top: 10px; margin-bottom: 12px; }
  #temp-bar-track { height: 6px; border-radius: 3px; background: linear-gradient(to right, #FF6B00, #FFD580, #FFFFFF, #B0D8FF, #6BB5FF); position: relative; }
  #temp-bar-thumb { position: absolute; top: -5px; width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff; background: #222; transform: translateX(-50%); transition: left 0.25s ease; box-shadow: 0 0 0 1px rgba(255,255,255,0.2); }

  /* Light source tags */
  .light-source-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .ls-tag { padding: 3px 9px; border-radius: 12px; font-size: 11px; border: 0.5px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); transition: all 0.2s; }
  .ls-tag.active { background: rgba(255,180,0,0.15); color: #FFB400; border-color: rgba(255,180,0,0.3); }

  /* Save button */
  #save-btn { width: 100%; padding: 10px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 12px; transition: background 0.15s; }
  #save-btn:hover { background: rgba(255,255,255,0.1); }

  /* Shot library */
  #shots-list { flex: 1; overflow-y: auto; padding: 8px 14px; }
  .shot-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
  .shot-swatch { width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0; border: 0.5px solid rgba(255,255,255,0.1); }
  .shot-info { flex: 1; min-width: 0; }
  .shot-cct { font-size: 13px; font-weight: 500; color: #fff; }
  .shot-meta { font-size: 11px; color: rgba(255,255,255,0.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shot-del { font-size: 14px; color: rgba(255,255,255,0.25); cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.15s; }
  .shot-del:hover { color: rgba(255,80,80,0.8); }
  #empty-shots { text-align: center; padding: 28px 0; color: rgba(255,255,255,0.25); font-size: 12px; }

  @media (max-width: 680px) {
    #main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    #sidebar { border-left: none; border-top: 0.5px solid rgba(255,255,255,0.08); }
    #camera-section { min-height: 280px; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>CINETEMP</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="badge" id="status-badge">Camera off</span>
    <span class="badge" id="fps-badge">—</span>
  </div>
</div>

<div id="main">
  <div id="camera-section">
    <div id="no-camera">
      <i class="ti ti-video"></i>
      <p>Enable camera to start reading color temperature</p>
      <button id="start-btn" onclick="startCamera()">
        <i class="ti ti-player-play"></i> Start camera
      </button>
    </div>
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvas-overlay"></canvas>
    <div id="crosshair"></div>
    <div id="readings-overlay">
      <div class="reading-pill"><span class="label">CCT</span><span id="cct-val">—</span> K</div>
      <div class="reading-pill"><span class="label">ND</span><span id="nd-val">—</span></div>
      <div class="reading-pill"><span class="label">EV</span><span id="ev-val">—</span></div>
      <div class="reading-pill"><span class="label">G/M</span><span id="gm-val">—</span></div>
    </div>
    <div id="histogram-container">
      <p>Luminance histogram</p>
      <canvas id="histCanvas" width="800" height="52"></canvas>
    </div>
  </div>

  <div id="sidebar">
    <div id="lens-selector">
      <button class="lens-btn active" onclick="setLens(this,'environment')">Main</button>
      <button class="lens-btn" onclick="setLens(this,'user')">Front</button>
    </div>

    <div class="sidebar-section">
      <h3>Color temperature</h3>
      <div class="metric-row">
        <span class="metric-label">CCT</span>
        <span><span class="metric-value" id="sb-cct">—</span><span class="metric-unit">K</span></span>
      </div>
      <div class="metric-row">
        <span class="metric-label">G/M shift</span>
        <span class="metric-value" id="sb-gm">—</span>
      </div>
      <div id="temp-bar-wrap">
        <div id="temp-bar-track"><div id="temp-bar-thumb"></div></div>
      </div>
      <div class="light-source-tags" id="ls-tags">
        <span class="ls-tag" data-min="1800" data-max="2200">Candle</span>
        <span class="ls-tag" data-min="2700" data-max="3200">Tungsten</span>
        <span class="ls-tag" data-min="3200" data-max="4000">Halogen</span>
        <span class="ls-tag" data-min="4000" data-max="5000">Fluorescent</span>
        <span class="ls-tag" data-min="5000" data-max="5500">Flash</span>
        <span class="ls-tag" data-min="5500" data-max="6500">Daylight</span>
        <span class="ls-tag" data-min="6500" data-max="8000">Overcast</span>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Exposure</h3>
      <div class="metric-row">
        <span class="metric-label">Luminance</span>
        <span><span class="metric-value" id="sb-lum">—</span><span class="metric-unit">%</span></span>
      </div>
      <div class="metric-row">
        <span class="metric-label">ND stop</span>
        <span class="metric-value" id="sb-nd">—</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">EV</span>
        <span class="metric-value" id="sb-ev">—</span>
      </div>
      <button id="save-btn" onclick="saveShot()">
        <i class="ti ti-bookmark"></i> Save reading
      </button>
    </div>

    <div class="sidebar-section" style="border-bottom:none;">
      <h3>Shot library (<span id="shot-count">0</span>)</h3>
    </div>
    <div id="shots-list">
      <div id="empty-shots">No saved readings yet</div>
    </div>
  </div>
</div>

<script>
  let stream = null;
  let animFrame = null;
  let currentFacingMode = 'environment';
  let shots = [];
  try { shots = JSON.parse(localStorage.getItem('cinetemp_shots') || '[]'); } catch(e){}
  let lastCCT = 5500, lastLum = 50, lastGM = 0;
  let frameCount = 0, lastFpsTime = Date.now();

  const video = document.getElementById('videoEl');
  const histCanvas = document.getElementById('histCanvas');
  const hctx = histCanvas.getContext('2d');
  const overlay = document.getElementById('canvas-overlay');
  const octx = overlay.getContext('2d');

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      video.srcObject = stream;
      video.style.display = 'block';
      overlay.style.display = 'block';
      document.getElementById('no-camera').style.display = 'none';
      document.getElementById('readings-overlay').style.display = 'flex';
      document.getElementById('histogram-container').style.display = 'block';
      document.getElementById('crosshair').style.display = 'block';
      document.getElementById('status-badge').textContent = 'Live';
      document.getElementById('status-badge').classList.add('live');
      video.addEventListener('loadedmetadata', () => {
        overlay.width = video.videoWidth;
        overlay.height = video.videoHeight;
        analyzeLoop();
      });
    } catch(e) {
      document.getElementById('no-camera').querySelector('p').textContent = 'Camera access denied. Please allow camera permission and reload.';
    }
  }

  function setLens(btn, mode) {
    document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFacingMode = mode;
    if (stream) { stopCamera(); startCamera(); }
  }

  function stopCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (animFrame) cancelAnimationFrame(animFrame);
  }

  function analyzeLoop() {
    if (!video.videoWidth) { animFrame = requestAnimationFrame(analyzeLoop); return; }
    octx.drawImage(video, 0, 0, overlay.width, overlay.height);

    const sampleW = Math.min(overlay.width, 400);
    const sampleH = Math.min(overlay.height, 225);
    const x0 = Math.floor((overlay.width - sampleW) / 2);
    const y0 = Math.floor((overlay.height - sampleH) / 2);
    const imgData = octx.getImageData(x0, y0, sampleW, sampleH);
    const d = imgData.data;

    let rSum = 0, gSum = 0, bSum = 0, n = 0;
    const hist = new Array(256).fill(0);
    for (let i = 0; i < d.length; i += 4) {
      rSum += d[i]; gSum += d[i+1]; bSum += d[i+2]; n++;
      const lum = Math.round(0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]);
      hist[lum]++;
    }

    const rAvg = rSum / n, gAvg = gSum / n, bAvg = bSum / n;
    const cct = rgbToCCT(rAvg, gAvg, bAvg);
    const lum = Math.round((rAvg*0.299 + gAvg*0.587 + bAvg*0.114) / 255 * 100);
    const gmShift = Math.round((gAvg - (rAvg + bAvg) / 2) * 0.1);
    const ev = parseFloat((Math.log2(lum / 12.5 + 0.01)).toFixed(1));
    const ndStop = lum > 5 ? parseFloat((Math.log2(lum / 5)).toFixed(1)) : 0;

    lastCCT = cct; lastLum = lum; lastGM = gmShift;

    document.getElementById('cct-val').textContent = cct;
    document.getElementById('nd-val').textContent = ndStop > 0 ? 'ND' + Math.pow(2, Math.ceil(ndStop)) : 'Clear';
    document.getElementById('ev-val').textContent = ev;
    document.getElementById('gm-val').textContent = gmShift > 0 ? '+' + gmShift + ' G' : gmShift < 0 ? Math.abs(gmShift) + ' M' : '0';
    document.getElementById('sb-cct').textContent = cct;
    document.getElementById('sb-lum').textContent = lum;
    document.getElementById('sb-nd').textContent = ndStop > 0 ? ndStop.toFixed(1) + ' stop' : 'Clear';
    document.getElementById('sb-ev').textContent = ev;
    document.getElementById('sb-gm').textContent = gmShift > 0 ? '+' + gmShift + ' G' : gmShift < 0 ? Math.abs(gmShift) + ' M' : '0';

    const pct = Math.min(Math.max((cct - 1800) / (8000 - 1800), 0), 1);
    document.getElementById('temp-bar-thumb').style.left = (pct * 100) + '%';

    document.querySelectorAll('.ls-tag').forEach(tag => {
      const min = parseInt(tag.dataset.min), max = parseInt(tag.dataset.max);
      tag.classList.toggle('active', cct >= min && cct <= max);
    });

    drawHistogram(hist);

    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime > 1000) {
      document.getElementById('fps-badge').textContent = frameCount + ' fps';
      frameCount = 0; lastFpsTime = now;
    }

    animFrame = requestAnimationFrame(analyzeLoop);
  }

  function rgbToCCT(r, g, b) {
    const total = r + g + b + 0.001;
    const rn = r / total, gn = g / total, bn = b / total;
    const denom = (0.89656*rn - 0.75929*gn + 0.02198*bn) + 0.001;
    const x = (-0.14282*rn + 1.54924*gn - 0.95641*bn) / denom;
    const y = (-0.96422*rn + 1.67662*gn - 0.06840*bn) / denom;
    const n = (x - 0.3320) / (0.1858 - y + 0.001);
    const cct = 449*n*n*n + 3525*n*n + 6823.3*n + 5520.33;
    return Math.min(Math.max(Math.round(cct / 50) * 50, 1800), 10000);
  }

  function drawHistogram(hist) {
    const W = histCanvas.width, H = histCanvas.height;
    hctx.clearRect(0, 0, W, H);
    const max = Math.max(...hist, 1);
    const bw = W / 256;
    for (let i = 0; i < 256; i++) {
      const h = (hist[i] / max) * H;
      const b = Math.round(i / 255 * 255);
      hctx.fillStyle = `rgba(${b},${b},${b},0.85)`;
      hctx.fillRect(i * bw, H - h, Math.ceil(bw), h);
    }
  }

  function cctToHex(cct) {
    let r, g, b;
    const t = cct / 100;
    if (t <= 66) {
      r = 255;
      g = Math.max(0, Math.min(255, 99.47 * Math.log(t) - 161.12));
      b = t <= 19 ? 0 : Math.max(0, Math.min(255, 138.52 * Math.log(t - 10) - 305.04));
    } else {
      r = Math.max(0, Math.min(255, 329.70 * Math.pow(t - 60, -0.133)));
      g = Math.max(0, Math.min(255, 288.12 * Math.pow(t - 60, -0.075)));
      b = 255;
    }
    return '#' + [r, g, b].map(v => Math.round(v).toString(16).padStart(2, '0')).join('');
  }

  function saveShot() {
    if (!stream) { alert('Start camera first to save a reading.'); return; }
    const now = new Date();
    const shot = {
      id: Date.now(),
      cct: lastCCT,
      lum: lastLum,
      gm: lastGM,
      time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      date: now.toLocaleDateString(),
      color: cctToHex(lastCCT)
    };
    shots.unshift(shot);
    if (shots.length > 30) shots.pop();
    try { localStorage.setItem('cinetemp_shots', JSON.stringify(shots)); } catch(e) {}
    renderShots();
  }

  function deleteShot(id) {
    shots = shots.filter(s => s.id !== id);
    try { localStorage.setItem('cinetemp_shots', JSON.stringify(shots)); } catch(e) {}
    renderShots();
  }

  function renderShots() {
    const list = document.getElementById('shots-list');
    document.getElementById('shot-count').textContent = shots.length;
    if (!shots.length) {
      list.innerHTML = '<div id="empty-shots">No saved readings yet</div>';
      return;
    }
    list.innerHTML = shots.map(s => `
      <div class="shot-item">
        <div class="shot-swatch" style="background:${s.color}"></div>
        <div class="shot-info">
          <div class="shot-cct">${s.cct} K</div>
          <div class="shot-meta">${s.date} ${s.time} · Lum ${s.lum}% · ${s.gm >= 0 ? '+'+s.gm+'G' : Math.abs(s.gm)+'M'}</div>
        </div>
        <span class="shot-del" onclick="deleteShot(${s.id})"><i class="ti ti-x"></i></span>
      </div>
    `).join('');
  }

  renderShots();
</script>
</body>
</html>
